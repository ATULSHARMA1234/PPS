<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver App | LogiFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { navy: '#0F172A', electric: '#2563EB', }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
</head>
<body class="font-sans antialiased bg-slate-100 text-slate-800 flex flex-col h-screen overflow-hidden">

    <!-- Top Status Bar (Mock Mobile) -->
    <header class="bg-navy pt-6 pb-4 px-6 shadow-md z-10">
        <div class="flex justify-between items-center text-white mb-2">
            <h1 class="text-xl font-bold tracking-tight">Active Route</h1>
            <div class="bg-green-500 w-3 h-3 rounded-full shadow-[0_0_8px_rgba(34,197,94,0.8)] animate-pulse"></div>
        </div>
        <p class="text-slate-300 text-sm">Zone: Andheri East Sector 4</p>
    </header>

    <!-- Map Placeholder Area -->
    <div class="h-[35vh] relative bg-slate-300 w-full overflow-hidden shrink-0 border-b-4 border-electric">
        <img src="https://maps.wikimedia.org/osm-intl/14/11696/7323.png" class="w-full h-full object-cover opacity-80 mix-blend-multiply filter grayscale" alt="Map">
        <!-- Mock GPS Marker -->
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
            <div class="w-10 h-10 bg-electric/30 rounded-full flex items-center justify-center animate-ping absolute"></div>
            <div class="w-5 h-5 bg-electric border-2 border-white rounded-full relative shadow-lg"></div>
        </div>
        
        <!-- Navigation Overlay -->
        <div onclick="window.showToast('Expanding turn-by-turn directions...');" class="absolute top-4 left-4 right-4 bg-navy/90 backdrop-blur text-white p-4 rounded-2xl shadow-xl flex items-center gap-4 border border-slate-700 cursor-pointer active:scale-95 transition-transform">
            <div class="w-12 h-12 bg-electric rounded-xl flex items-center justify-center shrink-0">
                <svg class="w-6 h-6 text-white transform -rotate-45" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            </div>
            <div>
                <p class="font-bold text-lg leading-tight">In 0.2 km, Turn Right</p>
                <p class="text-sm text-slate-300">Onto SV Road.</p>
            </div>
        </div>
    </div>

    <!-- Manifest / Content Area -->
    <main class="flex-1 overflow-y-auto w-full pb-24">
        
        <!-- Delivery Stats -->
        <div class="bg-white px-6 py-4 flex justify-between items-center shadow-sm sticky top-0 z-10 border-b border-slate-200">
            <div>
                <p class="text-xs text-slate-500 font-semibold uppercase">Remaining</p>
                <p class="text-2xl font-bold text-navy">14 <span class="text-sm text-slate-400 font-normal">/ 85 pkgs</span></p>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-500 font-semibold uppercase">ETA</p>
                <p class="text-2xl font-bold text-electric">4:15 PM</p>
            </div>
        </div>

        <div class="p-4 space-y-4">
            <h2 class="text-sm font-bold text-slate-400 uppercase ml-2 tracking-wide mb-2">Up Next</h2>
            
            <!-- Delivery Item Next -->
            <div class="bg-navy rounded-2xl shadow-xl p-5 border border-slate-800 relative overflow-hidden group">
                <div class="absolute right-0 top-0 w-32 h-32 bg-electric/20 rounded-full blur-2xl transform translate-x-10 -translate-y-10 group-hover:bg-electric/40 transition"></div>
                <div class="flex justify-between items-start mb-4 relative z-10">
                    <div>
                        <span class="bg-electric text-white text-xs font-bold px-2 py-1 rounded inline-block mb-2">Stop #72</span>
                        <h3 class="font-bold text-white text-lg">Trade Centre, BKC</h3>
                        <p class="text-slate-300 text-sm">Contact: Sarah Connor</p>
                    </div>
                </div>
                <!-- Action Buttons -->
                <div class="flex gap-3 relative z-10 mt-6 pt-4 border-t border-slate-700">
                    <button id="deliver-btn" onclick="markDelivered(this)" class="flex-1 bg-green-500 hover:bg-green-400 text-white font-bold py-3 rounded-xl shadow-lg shadow-green-500/20 active:scale-95 transition-all text-sm flex items-center justify-center gap-2">
                        <svg class="w-5 h-5 btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        <span class="btn-text">Mark Delivered</span>
                    </button>
                    <button onclick="window.showToast('Connecting to customer...')" class="bg-slate-700 hover:bg-slate-600 text-white font-bold p-3 rounded-xl shadow active:scale-95 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Future Deliveries -->
            <div class="bg-white rounded-2xl shadow-sm p-4 flex gap-4 items-center opacity-80">
                <div class="bg-slate-100 text-slate-500 font-bold p-3 rounded-xl text-center min-w-[3.5rem]">
                    #73
                </div>
                <div>
                    <h3 class="font-bold text-navy">120 Linking Road</h3>
                    <p class="text-slate-500 text-sm">2 Packages</p>
                </div>
            </div>
            
            <div class="bg-white rounded-2xl shadow-sm p-4 flex gap-4 items-center opacity-80">
                <div class="bg-slate-100 text-slate-500 font-bold p-3 rounded-xl text-center min-w-[3.5rem]">
                    #74
                </div>
                <div>
                    <h3 class="font-bold text-navy">1530 Marine Drive</h3>
                    <p class="text-slate-500 text-sm">1 Package</p>
                </div>
            </div>

        </div>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="bg-white border-t border-slate-200 fixed bottom-0 w-full h-20 px-6 flex justify-between items-center pb-2 z-20">
        <a href="#" onclick="event.preventDefault(); window.showToast('Switching to Route view');" class="flex flex-col items-center text-electric">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            <span class="text-[10px] font-bold">Route</span>
        </a>
        <a href="#" onclick="event.preventDefault(); window.showToast('Opening full Area Map');" class="flex flex-col items-center text-slate-400 hover:text-navy transition-colors">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
            <span class="text-[10px] font-medium">Map</span>
        </a>
        <div class="relative -top-6">
            <button onclick="window.showToast('Activating Barcode/QR Scanner...')" class="bg-electric w-16 h-16 rounded-full flex items-center justify-center text-white shadow-lg shadow-electric/40 border-4 border-slate-100 active:scale-95 transition-all focus:outline-none">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
            </button>
        </div>
        <a href="#" onclick="event.preventDefault(); window.showToast('Opening Dispatch Chat');" class="flex flex-col items-center text-slate-400 hover:text-navy transition-colors">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
            <span class="text-[10px] font-medium">Chat</span>
        </a>
        <a href="#" onclick="event.preventDefault(); window.showToast('Opening Driver Profile');" class="flex flex-col items-center text-slate-400 hover:text-navy transition-colors">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="text-[10px] font-medium">Profile</span>
        </a>
    </nav>
    <script>
        window.showToast = function(message) {
            let container = document.getElementById('toast-container');
            if(!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'fixed top-20 left-4 right-4 z-[9999] flex flex-col gap-2 pointer-events-none items-center';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = 'bg-navy border border-slate-700 text-white px-4 py-3 rounded-xl shadow-2xl transition-all duration-300 -translate-y-10 opacity-0 text-sm font-semibold flex items-center gap-2 pointer-events-auto w-full max-w-sm justify-center';
            toast.innerHTML = `${message}`;
            container.appendChild(toast);
            
            requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.remove('-translate-y-10', 'opacity-0')));
            setTimeout(() => { 
                toast.classList.add('-translate-y-10', 'opacity-0'); 
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        };

        function markDelivered(btn) {
            btn.classList.remove('bg-green-500', 'hover:bg-green-400');
            btn.classList.add('bg-slate-600', 'pointer-events-none');
            btn.querySelector('.btn-text').innerText = 'Completed ✔';
            btn.querySelector('.btn-icon').style.display = 'none';
            
            // visually update stats mock
            const stats = document.querySelector('.text-2xl.font-bold.text-navy');
            if(stats) stats.innerHTML = '13 <span class="text-sm text-slate-400 font-normal">/ 85 pkgs</span>';
            
            window.showToast('Package marked as delivered! Syncing...');
        }
    </script>
</body>
</html>
